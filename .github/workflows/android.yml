name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Build Debug APK
        working-directory: ./AccountBook
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        continue-on-error: true
      
      - name: List build outputs
        working-directory: ./AccountBook
        run: |
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK"
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: AccountBook/app/build/outputs/apk/debug/*.apk
          retention-days: 7
